<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTFS Pilot Notes</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #fdfdfd;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .notebook {
            width: 100%;
            max-width: 380px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #333;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }

        .craft-section {
            padding: 15px;
            position: relative;
        }

        /* The vertical red line found in real notebooks */
        .craft-section::before {
            content: '';
            position: absolute;
            left: 50px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255, 0, 0, 0.3);
        }

        .line {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 8px;
        }

        .letter {
            width: 40px;
            font-size: 20px;
            font-weight: bold;
            color: #007bff;
            text-align: center;
            z-index: 1;
        }

        input {
            flex: 1;
            border: none;
            padding: 8px 10px;
            font-size: 16px;
            outline: none;
            background: transparent;
            color: #444;
        }

        .long-notes {
            padding: 0 15px 15px 15px;
        }

        label {
            display: block;
            font-size: 10px;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 150px;
            border: 1px solid #eee;
            background: #fafafa;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        .actions {
            display: flex;
            padding: 10px;
            gap: 10px;
            background: #f1f1f1;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .btn-clear { background: #e74c3c; color: white; }
        .btn-print { background: #2ecc71; color: white; }
    </style>
</head>
<body>

<div class="notebook">
    <div class="header">ATC SHORTHAND (C.R.A.F.T.)</div>
    
    <div class="craft-section">
        <div class="line"><div class="letter">C</div><input type="text" placeholder="Clearance Limit"></div>
        <div class="line"><div class="letter">R</div><input type="text" placeholder="Route / RV / AF"></div>
        <div class="line"><div class="letter">A</div><input type="text" placeholder="Altitude"></div>
        <div class="line"><div class="letter">F</div><input type="text" placeholder="Frequency"></div>
        <div class="line"><div class="letter">T</div><input type="text" placeholder="Squawk"></div>
    </div>

    <div class="long-notes">
        <label>Additional Instructions (Taxi/Gates/V-Speeds)</label>
        <textarea placeholder="Example: Taxi to Gate 4 via Alpha..."></textarea>
    </div>

    <div class="actions">
        <button class="btn-print" onclick="window.print()">Print to PDF</button>
        <button class="btn-clear" onclick="if(confirm('Clear all notes?')) location.reload()">Clear All</button>
    </div>
</div>

</body>
</html>
